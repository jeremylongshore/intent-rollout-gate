# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit — intent-rollout-gate (Intent Eval Platform). Semantic AI code review. Three
# non-overlapping layers: L1 deterministic CI (prettier/markdownlint/yamllint/
# actionlint/typos[/eslint/ruff]) owns style; CodeRabbit (here) owns semantic
# review; CodeQL (security-extended) owns security. CodeRabbit's built-in linters
# are disabled so it never re-reports what L1 already gates. Terse, assertive,
# findings-only. gitleaks (CodeRabbit-native secret scan) stays ON.
language: en-US
tone_instructions: "Be terse and technical. No preamble, praise, poems, or summaries — findings only: the problem, the file and line, the concrete fix. Flag every real issue; never soft-pedal or skip. Hardcore code review, not a status report."
reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: false
  changed_files_summary: false
  sequence_diagrams: false
  poem: false
  review_status: false
  in_progress_fortune: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  tools:
    eslint:
      enabled: false
    ruff:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
  path_filters:
    - "!**/dist/**"
    - "!**/node_modules/**"
    - "!**/coverage/**"
    - "!**/*.snap"
    - "!**/*.lock"
    - "!pnpm-lock.yaml"
  path_instructions:
    - path: "**/src/**"
      instructions: >-
        intent-rollout-gate is a thin GitHub Action shell that delegates decision logic to
        @intentsolutions/rollout-gate and consumes signed @intentsolutions/core evidence.
        Flag, by priority: (1) decision logic that belongs in the library leaking into the
        Action shell (the shell parses inputs + renders outputs; it must NOT re-implement the
        gate predicate). (2) a gate that fails-open — on a missing/unverifiable evidence
        bundle, a parse error, or a signature-verification failure, the Action must
        fail-closed (block the rollout), never default to pass. (3) untrusted input (PR title,
        bundle contents) flowing into a shell/`exec` without sanitization, or a secret echoed
        to logs / GITHUB_STEP_SUMMARY. (4) action.yml inputs/outputs that drift from what the
        code reads/writes. (5) a non-additive change to the Action's input/output contract
        without a major tag.
    - path: "**/*.{sh,yml,yaml}"
      instructions: >-
        Flag CI/release scripts that silently no-op or fail-open, an action pinned to a moving
        @main/@latest instead of a tag/SHA, and unsafe bash array expansion under `set -u`
        (use `${ARR[@]+"${ARR[@]}"}`).
chat:
  auto_reply: true
