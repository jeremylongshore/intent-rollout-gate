name: Actionlint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint (workflow-yaml lint, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Lint .github/workflows/*.yml with rhysd/actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          level: warning
          fail_on_error: false
