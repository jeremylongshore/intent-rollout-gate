name: Release

# Release pipeline for the Intent Rollout Gate GitHub Action.
#
# CANONICAL tag-trigger-only pattern (mirrors intent-eval-core's release.yml):
# this workflow fires ONLY on a pushed tag `v*.*.*`. There is intentionally NO
# auto-bump-on-push-to-main job — that pattern fails against branch protection
# (the workflow cannot push a version-bump commit back to a protected `main`).
# The release flow is: maintainer runs `npm version <patch|minor|major>` locally,
# pushes the tag, and this workflow does the rest.
#
# Because this repo ships a GitHub *Action* (not an npm package), the committed
# dist/index.js IS the published artifact (`uses: jeremylongshore/intent-rollout-gate@vX`
# resolves to the tagged tree). So the release does NOT publish to npm. Instead it:
#   1. Verifies the pushed tag matches package.json#version (drift guard).
#   2. Rebuilds dist/index.js and asserts the committed bundle is reproducible
#      (git diff clean) — a stale committed dist blocks the release.
#   3. Creates the GitHub Release for the tag.
#   4. Retags the floating major alias (e.g. v1) → the released tag, so
#      `uses: jeremylongshore/intent-rollout-gate@v1` tracks the latest v1.x.y.
#
# Signing is DELIBERATE and SEPARATE from the tag-push release. A plain tag
# push does build + GitHub Release + floating-major retag, but does NOT sign.
# Signing — always to PRODUCTION sigstore (cosign default trust root) — runs
# ONLY on workflow_dispatch, is ALWAYS gated by the iah-E06 DNSSEC/CAA
# pre-flight (fail-closed), and defaults to a reversible dry-run. See § sign job.

on:
  push:
    tags:
      - "v*.*.*"
  # Manual dispatch drives the deliberate, gated signing operation (and can also
  # re-run release bookkeeping against an already-pushed tag). It cannot create
  # a new version. Signing ALWAYS targets PRODUCTION sigstore; the dry-run input
  # controls only whether a permanent Rekor transparency-log entry is written.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release / sign, e.g. v0.2.0"
        required: true
        type: string
      dry-run:
        description: >-
          DRY-RUN (default true, safe by default): when true, cosign obtains a
          real PRODUCTION Fulcio cert and verifies the SCT against the default
          (production) trust root, the iah-E06 DNSSEC/CAA pre-flight runs, but
          NO transparency-log entry is written (--tlog-upload=false) and the
          bundle is NOT attached to the Release — it is uploaded as a workflow
          artifact for inspection only. Set to false to perform a REAL
          production signature: a permanent rekor.sigstore.dev entry is written
          and the bundle is attached to the GitHub Release. A Rekor entry is
          permanent — a real fire is a one-way door. There is no staging path:
          signing always targets the PRODUCTION trust root.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build + verify the release is reproducible and the tag is consistent.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Verify tag + reproducible dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      major: ${{ steps.resolve.outputs.major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pin to the dispatched tag on workflow_dispatch (re-release/sign): without
          # this, checkout resolves GITHUB_REF (default branch) and the rebuilt+signed
          # dist would attest bytes from main, not the tag consumers resolve via @<tag>.
          # On a tag-push event inputs.tag is empty -> checkout falls back to the pushed
          # tag (GITHUB_REF), which is the correct ref. (umbrella review 2026-06-14)
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Resolve tag (push tag or dispatch input)
        id: resolve
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          case "$tag" in
            v*.*.*) : ;;
            *) echo "::error::tag '$tag' does not match v*.*.* — refusing"; exit 1 ;;
          esac
          major="${tag%%.*}"   # v1.2.3 -> v1
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$tag, floating-major-alias=$major"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version (drift guard)
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          tag_version="${TAG#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag v$tag_version does not match package.json version $pkg_version — bump package.json and retag."
            exit 1
          fi
          echo "Tag and package version both: $tag_version"

      - name: Harness verify (hash-pinned policy artifacts)
        run: pnpm exec audit-harness verify

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Reproducible dist (rebuild → committed bundle must match)
        run: |
          set -euo pipefail
          pnpm run build
          if ! git diff --exit-code dist/; then
            echo "::error::Committed dist/index.js is not reproducible from src/. Run 'pnpm run build' and commit the result before tagging."
            exit 1
          fi
          echo "dist/index.js is reproducible and in sync."

      - name: Upload dist artifact for the sign job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/index.js
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Create the GitHub Release + retag the floating major alias.
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release + floating major retag
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the Release + push the floating-major tag
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pin to the dispatched tag on workflow_dispatch (re-release/sign): without
          # this, checkout resolves GITHUB_REF (default branch) and the rebuilt+signed
          # dist would attest bytes from main, not the tag consumers resolve via @<tag>.
          # On a tag-push event inputs.tag is empty -> checkout falls back to the pushed
          # tag (GITHUB_REF), which is the correct ref. (umbrella review 2026-06-14)
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving notes as-is."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
            echo "Created release $TAG"
          fi

      - name: Retag floating major alias (e.g. v1 → released tag)
        env:
          TAG: ${{ needs.build.outputs.tag }}
          MAJOR: ${{ needs.build.outputs.major }}
        run: |
          set -euo pipefail
          # Move the floating major alias to point at the released commit so
          # `uses: jeremylongshore/intent-rollout-gate@v1` tracks the latest
          # v1.x.y. Force-update is intended for a floating alias.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          released_sha="$(git rev-list -n1 "$TAG")"
          git tag -f "$MAJOR" "$released_sha"
          git push -f origin "refs/tags/$MAJOR"
          echo "Floating alias $MAJOR now points at $released_sha (from $TAG)"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Sign dist/index.js with cosign keyless against the PRODUCTION sigstore
  #    trust root. DISPATCH-ONLY, iah-E06-gated, dry-run by default.
  # ─────────────────────────────────────────────────────────────────────────
  #
  # Production-only, deliberate, reversible signing:
  #
  #   This job runs ONLY on workflow_dispatch (`if:` guard below). A plain tag
  #   push does build + Release + floating-major retag and stops there — signing
  #   is an explicit, gated, deliberate operation, never a side effect of a tag.
  #
  #   There is NO staging path. Signing always targets the PRODUCTION sigstore
  #   public-good trust root: cosign's DEFAULT trust root (fulcio.sigstore.dev +
  #   rekor.sigstore.dev), with GitHub Actions ambient keyless OIDC (issuer
  #   https://token.actions.githubusercontent.com via id-token: write). We do
  #   NOT pass --rekor-url / --fulcio-url / --oidc-issuer overrides — cosign's
  #   defaults already ARE the production endpoints + ambient GHA OIDC. (A prior
  #   sigstage path was removed: signing to sigstage needs sigstage's own TUF
  #   trust root but cosign defaults to production, so the SCT verification
  #   failed — and sigstage is non-representative of where real attestations
  #   live anyway.)
  #
  #   THE GATE (fail-closed, ALWAYS): production is the only target, so the
  #   iah-E06 DNSSEC/CAA pre-flight runs on EVERY dispatch — both dry-run and
  #   real fire. It is a read-only DNS verification and is part of what we
  #   validate. It fetches the published @intentsolutions/audit-harness scripts
  #   and runs BOTH DNSSEC + CAA checks against the predicate-URI host under
  #   `set -euo pipefail`. If EITHER check exits non-zero (DNSSEC not validated,
  #   CAA not pinned, or no resolver tool), the step fails → the job fails →
  #   cosign NEVER runs. The pre-flight aborts the job before any signing.
  #
  #   DRY-RUN controls the Rekor write (the reversible part): a Rekor entry is
  #   permanent, so a real fire is a one-way door. With dry-run=true (default),
  #   cosign still obtains a real production Fulcio cert and verifies the SCT
  #   against the default trust root, but --tlog-upload=false means NO
  #   transparency-log entry is written and the bundle is NOT attached to the
  #   Release (uploaded as a workflow artifact for inspection only). With
  #   dry-run=false, --tlog-upload=true writes the permanent rekor.sigstore.dev
  #   entry and the bundle is attached to the GitHub Release. The gate is
  #   one-way: it can only make signing more conservative, never less.
  sign:
    name: cosign keyless sign dist (PRODUCTION; dispatch-only, dry-run default, iah-E06-gated)
    needs: build
    # DISPATCH-ONLY: a plain tag push never signs. Signing — especially the real
    # production fire — is an explicit, deliberate, gated operation.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # attach .sigstore bundle to the Release (real fire only)
      id-token: write # cosign keyless (Fulcio OIDC) — no secret needed
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pin to the dispatched tag on workflow_dispatch (re-release/sign): without
          # this, checkout resolves GITHUB_REF (default branch) and the rebuilt+signed
          # dist would attest bytes from main, not the tag consumers resolve via @<tag>.
          # On a tag-push event inputs.tag is empty -> checkout falls back to the pushed
          # tag (GITHUB_REF), which is the correct ref. (umbrella review 2026-06-14)
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # iah-E06 DNSSEC/CAA pre-flight — THE FAIL-CLOSED PRODUCTION GATE.
      #
      # Production is the only target, so this ALWAYS runs (dry-run AND real
      # fire) — it is a read-only DNS verification and is part of what a dry-run
      # validates. It fetches the published @intentsolutions/audit-harness
      # pre-flight scripts and runs BOTH the DNSSEC and CAA verification against
      # the predicate-URI host. Both scripts are read-only and fail-closed: they
      # exit non-zero unless a trusted public resolver positively confirms
      # (DNSSEC fully validated; CAA present + pinned). Under `set -euo
      # pipefail`, EITHER non-zero exit aborts this step → fails the job → cosign
      # never runs. This is the only thing standing between a dispatch and a
      # cosign invocation, so it MUST run before the cosign step.
      - name: iah-E06 production pre-flight (DNSSEC + CAA, fail-closed)
        env:
          # Predicate URIs live ONLY at evals.intentsolutions.io (CISO binding).
          PREDICATE_URI_HOST: evals.intentsolutions.io
        run: |
          set -euo pipefail
          PRED_HOST="${PREDICATE_URI_HOST:-evals.intentsolutions.io}"
          echo "iah-E06 pre-flight: verifying DNSSEC + CAA for '$PRED_HOST' before production signing"
          # Fetch the published pre-flight scripts hermetically (no repo dep
          # change, no lockfile install in this job). 1.1.8 is the first release
          # that ships these scripts.
          preflight_dir="$(mktemp -d)"
          npm i @intentsolutions/audit-harness@1.1.8 --no-save --prefix "$preflight_dir" >/dev/null 2>&1
          scripts_dir="$preflight_dir/node_modules/@intentsolutions/audit-harness/scripts"
          test -f "$scripts_dir/dnssec-check.sh" || { echo "::error::iah-E06 dnssec-check.sh missing from audit-harness@1.1.8 — refusing to sign to production"; exit 1; }
          test -f "$scripts_dir/caa-check.sh"    || { echo "::error::iah-E06 caa-check.sh missing from audit-harness@1.1.8 — refusing to sign to production"; exit 1; }
          # Either non-zero exit aborts under set -e → job fails → no signing.
          bash "$scripts_dir/dnssec-check.sh" "$PRED_HOST"
          bash "$scripts_dir/caa-check.sh" "$PRED_HOST"
          echo "✓ iah-E06 pre-flight PASSED for '$PRED_HOST' — production signing authorized"

      - name: Resolve signing mode (dry-run controls the Rekor write)
        id: mode
        run: |
          set -euo pipefail
          # dry-run=true  → TLOG_UPLOAD=false → cosign gets a real production
          #                 Fulcio cert + verifies the SCT against the default
          #                 trust root, but writes NO permanent Rekor entry.
          # dry-run=false → TLOG_UPLOAD=true  → permanent rekor.sigstore.dev entry.
          tlog="${{ inputs.dry-run && 'false' || 'true' }}"
          echo "tlog_upload=$tlog" >> "$GITHUB_OUTPUT"
          if [ "$tlog" = "true" ]; then
            echo "mode=PRODUCTION — signed + logged to rekor.sigstore.dev" >> "$GITHUB_OUTPUT"
          else
            echo "mode=DRY-RUN — no Rekor entry written" >> "$GITHUB_OUTPUT"
          fi

      - name: cosign sign-blob dist/index.js (keyless → PRODUCTION trust root)
        env:
          TLOG_UPLOAD: ${{ steps.mode.outputs.tlog_upload }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -euo pipefail
          # PRODUCTION sigstore public-good trust root — cosign's DEFAULT. We do
          # NOT pass --rekor-url / --fulcio-url / --oidc-issuer: cosign's
          # defaults already are fulcio.sigstore.dev + rekor.sigstore.dev, and
          # keyless uses the GH Actions ambient OIDC token (id-token: write,
          # issuer https://token.actions.githubusercontent.com) automatically —
          # no --identity-token, no secret. --new-bundle-format emits the
          # sigstore protobuf Bundle (mediaType + verificationMaterial +
          # messageSignature) consumable by sigstore-js verify().
          #
          # --tlog-upload="$TLOG_UPLOAD" is the reversible switch: false (dry-run)
          # gets a real production Fulcio cert + verifies the SCT against the
          # default trust root but writes NO permanent Rekor entry; true (real
          # fire) writes the permanent rekor.sigstore.dev entry. Reached only
          # after the iah-E06 DNSSEC/CAA pre-flight passed (fail-closed gate).
          echo "Signing mode: $MODE (--tlog-upload=$TLOG_UPLOAD)"
          cosign sign-blob \
            --yes \
            --new-bundle-format \
            --tlog-upload="$TLOG_UPLOAD" \
            --bundle dist/index.js.sigstore.json \
            dist/index.js
          test -s dist/index.js.sigstore.json || { echo "::error::cosign produced no bundle"; exit 1; }
          echo "✓ signed dist/index.js → dist/index.js.sigstore.json ($MODE)"

      # DRY-RUN: do NOT attach/clobber the Release asset — this is a validation.
      # Upload the bundle as a workflow artifact for inspection only.
      - name: Upload signature bundle as artifact (dry-run only)
        if: ${{ inputs.dry-run }}
        uses: actions/upload-artifact@v4
        with:
          name: dist-sigstore-bundle-dryrun
          path: dist/index.js.sigstore.json
          if-no-files-found: error
          retention-days: 7

      # REAL FIRE: attach the production-signed bundle to the GitHub Release.
      - name: Attach signature bundle to the Release (real fire only)
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          # release job runs in parallel; create-or-upload is idempotent so the
          # ordering between the two jobs does not matter.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/index.js.sigstore.json --clobber
          else
            gh release create "$TAG" dist/index.js.sigstore.json \
              --title "$TAG" --generate-notes --verify-tag
          fi
          echo "✓ dist/index.js.sigstore.json attached to release $TAG"

      - name: Echo final signing mode
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: echo "$MODE"

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Alert on release failure → tailnet-only ntfy (prod-deploys topic).
  # ─────────────────────────────────────────────────────────────────────────
  #
  # Fires ONLY when the build or release job fails (`if: failure()`). Because
  # this whole workflow is TAG-triggered, this job never runs on a PR — it only
  # ever fires on a future failed tag-release. It joins the tailnet over
  # Tailscale OIDC (ephemeral, tag:ci) and pushes a high-priority alert to the
  # ntfy `prod-deploys` topic, reachable only from inside the tailnet.
  alert-on-failure:
    name: alert-on-failure
    needs: [build, release]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # Tailscale OIDC auth
    steps:
      - name: Connect to tailnet (Tailscale OIDC)
        uses: tailscale/github-action@v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OIDC_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Wait for tailnet
        run: |
          set -euo pipefail
          # Tailscale brings the interface up asynchronously; poll the prod VPS
          # tailnet IP until a single ping succeeds (up to ~20 tries, 2s apart).
          for i in $(seq 1 20); do
            if sudo tailscale ping --c 1 --timeout 2s 100.88.144.55 >/dev/null 2>&1; then
              echo "tailnet reachable (try $i)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::tailnet peer 100.88.144.55 not reachable after ~40s"
          exit 1

      - name: Notify ntfy
        env:
          NTFY_AUTH_TOKEN: ${{ secrets.NTFY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -m 10 -X POST \
            -H "Title: [intent-rollout-gate] Release CI FAILED" \
            -H "Priority: high" \
            -H "Tags: prod-deploys,rotating_light" \
            -H "Authorization: Bearer ${NTFY_AUTH_TOKEN}" \
            --data "Release CI failed on ref ${{ github.ref_name }} (sha ${{ github.sha }}). Run: ${run_url}" \
            http://intentsolutions:8080/prod-deploys

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Notify the platform umbrella to regenerate its aggregate changelog.
  # ─────────────────────────────────────────────────────────────────────────
  #
  # The umbrella repo intent-solutions-io/intent-eval-platform keeps an aggregate
  # CHANGELOG.md regenerated from every platform repo's GitHub Releases (daily
  # schedule + workflow_dispatch + repository_dispatch type "release-published").
  # This job pings the umbrella after a release here is published so the aggregate
  # updates instantly instead of waiting up to a day for the daily schedule.
  #
  # WHY a job INSIDE release.yml (not a standalone `on: release: published`):
  # GitHub suppresses workflow events for Releases created with the default
  # GITHUB_TOKEN (the `release` job above uses `gh release create` with
  # GITHUB_TOKEN), so an `on: release: published` workflow would never fire. The
  # notify therefore lives as a job that runs AFTER the release job, gated on its
  # success (default `needs` semantics — this job is skipped if `release` failed).
  notify-umbrella-changelog:
    name: Notify umbrella to regenerate the platform changelog
    needs: [release]
    runs-on: ubuntu-latest
    continue-on-error: true # best-effort; the umbrella's daily schedule is the backstop
    permissions:
      contents: read
    steps:
      - name: Dispatch release-published to the platform umbrella
        env:
          DISPATCH_TOKEN: ${{ secrets.UMBRELLA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "UMBRELLA_DISPATCH_TOKEN not configured — skipping umbrella notify (its daily schedule still picks up this release)."
            exit 0
          fi
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/intent-solutions-io/intent-eval-platform/dispatches \
            -d "{\"event_type\":\"release-published\",\"client_payload\":{\"repo\":\"${GITHUB_REPOSITORY}\",\"ref\":\"${GITHUB_REF_NAME}\"}}"
          echo "Dispatched release-published to intent-solutions-io/intent-eval-platform."
