name: Release

# Release pipeline for the Intent Rollout Gate GitHub Action.
#
# CANONICAL tag-trigger-only pattern (mirrors intent-eval-core's release.yml):
# this workflow fires ONLY on a pushed tag `v*.*.*`. There is intentionally NO
# auto-bump-on-push-to-main job — that pattern fails against branch protection
# (the workflow cannot push a version-bump commit back to a protected `main`).
# The release flow is: maintainer runs `npm version <patch|minor|major>` locally,
# pushes the tag, and this workflow does the rest.
#
# Because this repo ships a GitHub *Action* (not an npm package), the committed
# dist/index.js IS the published artifact (`uses: jeremylongshore/intent-rollout-gate@vX`
# resolves to the tagged tree). So the release does NOT publish to npm. Instead it:
#   1. Verifies the pushed tag matches package.json#version (drift guard).
#   2. Rebuilds dist/index.js and asserts the committed bundle is reproducible
#      (git diff clean) — a stale committed dist blocks the release.
#   3. Creates the GitHub Release for the tag.
#   4. Retags the floating major alias (e.g. v1) → the released tag, so
#      `uses: jeremylongshore/intent-rollout-gate@v1` tracks the latest v1.x.y.
#   5. Keyless-signs dist/index.js with cosign (Fulcio OIDC — no secret needed,
#      GH Actions `id-token: write`) and pushes the attestation to the sigstore
#      STAGING transparency log by default. Production Rekor is ENABLED but
#      gated behind the iah-E06 DNSSEC/CAA pre-flight (fail-closed) and is
#      reachable ONLY via the `use-production-rekor` dispatch input — see
#      § sign job.

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual dispatch is provided ONLY so a maintainer can re-run signing/release
  # bookkeeping against an already-pushed tag. It cannot create a new version.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.1.0'
        required: true
        type: string
      use-production-rekor:
        description: >-
          Selects the sigstore PRODUCTION transparency log (rekor.sigstore.dev)
          instead of the default STAGING log (rekor.sigstage.dev). ENABLED but
          GATED: when true, the sign job FIRST runs the iah-E06 DNSSEC + CAA
          pre-flight against the predicate-URI host (evals.intentsolutions.io)
          and FAILS CLOSED if either check does not pass — only then does cosign
          anchor to production Rekor. A plain tag push never reaches production
          (this input is only ever set via workflow_dispatch); staging stays the
          tag-push default. See the sign job comment block.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build + verify the release is reproducible and the tag is consistent.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Verify tag + reproducible dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      major: ${{ steps.resolve.outputs.major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag (push tag or dispatch input)
        id: resolve
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          case "$tag" in
            v*.*.*) : ;;
            *) echo "::error::tag '$tag' does not match v*.*.* — refusing"; exit 1 ;;
          esac
          major="${tag%%.*}"   # v1.2.3 -> v1
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$tag, floating-major-alias=$major"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version (drift guard)
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          tag_version="${TAG#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag v$tag_version does not match package.json version $pkg_version — bump package.json and retag."
            exit 1
          fi
          echo "Tag and package version both: $tag_version"

      - name: Harness verify (hash-pinned policy artifacts)
        run: pnpm exec audit-harness verify

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Reproducible dist (rebuild → committed bundle must match)
        run: |
          set -euo pipefail
          pnpm run build
          if ! git diff --exit-code dist/; then
            echo "::error::Committed dist/index.js is not reproducible from src/. Run 'pnpm run build' and commit the result before tagging."
            exit 1
          fi
          echo "dist/index.js is reproducible and in sync."

      - name: Upload dist artifact for the sign job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/index.js
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Create the GitHub Release + retag the floating major alias.
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release + floating major retag
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # create the Release + push the floating-major tag
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving notes as-is."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
            echo "Created release $TAG"
          fi

      - name: Retag floating major alias (e.g. v1 → released tag)
        env:
          TAG: ${{ needs.build.outputs.tag }}
          MAJOR: ${{ needs.build.outputs.major }}
        run: |
          set -euo pipefail
          # Move the floating major alias to point at the released commit so
          # `uses: jeremylongshore/intent-rollout-gate@v1` tracks the latest
          # v1.x.y. Force-update is intended for a floating alias.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          released_sha="$(git rev-list -n1 "$TAG")"
          git tag -f "$MAJOR" "$released_sha"
          git push -f origin "refs/tags/$MAJOR"
          echo "Floating alias $MAJOR now points at $released_sha (from $TAG)"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Sign dist/index.js with cosign keyless (Fulcio OIDC). STAGING Rekor by
  #    default; PRODUCTION Rekor enabled but gated by the iah-E06 pre-flight.
  # ─────────────────────────────────────────────────────────────────────────
  #
  # STAGING vs PRODUCTION transparency log — production ENABLED, fail-closed:
  #
  #   The default trust root is sigstore STAGING (fulcio.sigstage.dev +
  #   rekor.sigstage.dev). Production (fulcio.sigstore.dev + rekor.sigstore.dev)
  #   is selected ONLY when the `use-production-rekor` workflow_dispatch input is
  #   explicitly `true`. A plain tag push never reaches production — the input is
  #   empty on a tag push, so the staging default wins. Staging behavior is
  #   unchanged from v0.1.0.
  #
  #   Production is now ENABLED because BOTH former preconditions are met:
  #     (a) audit-harness iah-E06 DNSSEC/CAA pre-flight is live and published —
  #         @intentsolutions/audit-harness@1.1.8 ships scripts/dnssec-check.sh +
  #         scripts/caa-check.sh (read-only, fail-closed verification of the
  #         predicate-URI host's DNSSEC chain + CAA pinning).
  #     (b) evals.intentsolutions.io has DNSSEC enabled + CAA records pinned in
  #         DNS (CISO binding — predicate URIs live ONLY at
  #         evals.intentsolutions.io; DNSSEC + CAA pinning required before the
  #         first signed PRODUCTION attestation). See umbrella CLAUDE.md
  #         "Operational rules" § 5.
  #
  #   THE GATE (fail-closed): when use-production-rekor=true the "iah-E06
  #   production pre-flight" step below runs BOTH harness scripts against the
  #   predicate-URI host under `set -euo pipefail`. If EITHER check exits
  #   non-zero (DNSSEC not validated, or CAA not pinned, or no resolver tool),
  #   the step fails → the job fails → cosign NEVER anchors to production Rekor.
  #   Production signing happens only after both checks pass green. A Rekor entry
  #   is permanent, so this gate is a one-way door: it can only make signing more
  #   conservative, never less.
  sign:
    name: cosign keyless sign dist (STAGING default; production gated by iah-E06)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # attach .sigstore bundle to the Release
      id-token: write   # cosign keyless (Fulcio OIDC) — no secret needed
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # iah-E06 DNSSEC/CAA pre-flight — THE FAIL-CLOSED PRODUCTION GATE.
      #
      # Runs ONLY when production is requested (use-production-rekor == true; a
      # plain tag push skips this step entirely and goes to staging). It fetches
      # the published @intentsolutions/audit-harness pre-flight scripts and runs
      # BOTH the DNSSEC and CAA verification against the predicate-URI host. Both
      # scripts are read-only and fail-closed: they exit non-zero unless a
      # trusted public resolver positively confirms (DNSSEC fully validated; CAA
      # present + pinned). Under `set -euo pipefail`, EITHER non-zero exit aborts
      # this step → fails the job → the cosign-to-production step never runs.
      # This is the only thing standing between a dispatch and a permanent
      # production Rekor entry, so it MUST run before "Select transparency log".
      - name: iah-E06 production pre-flight (DNSSEC + CAA, fail-closed)
        if: ${{ inputs.use-production-rekor == true }}
        env:
          # Predicate URIs live ONLY at evals.intentsolutions.io (CISO binding).
          PREDICATE_URI_HOST: evals.intentsolutions.io
        run: |
          set -euo pipefail
          PRED_HOST="${PREDICATE_URI_HOST:-evals.intentsolutions.io}"
          echo "iah-E06 pre-flight: verifying DNSSEC + CAA for '$PRED_HOST' before production signing"
          # Fetch the published pre-flight scripts hermetically (no repo dep
          # change, no lockfile install in this job). 1.1.8 is the first release
          # that ships these scripts.
          preflight_dir="$(mktemp -d)"
          npm i @intentsolutions/audit-harness@1.1.8 --no-save --prefix "$preflight_dir" >/dev/null 2>&1
          scripts_dir="$preflight_dir/node_modules/@intentsolutions/audit-harness/scripts"
          test -f "$scripts_dir/dnssec-check.sh" || { echo "::error::iah-E06 dnssec-check.sh missing from audit-harness@1.1.8 — refusing to sign to production"; exit 1; }
          test -f "$scripts_dir/caa-check.sh"    || { echo "::error::iah-E06 caa-check.sh missing from audit-harness@1.1.8 — refusing to sign to production"; exit 1; }
          # Either non-zero exit aborts under set -e → job fails → no prod sign.
          bash "$scripts_dir/dnssec-check.sh" "$PRED_HOST"
          bash "$scripts_dir/caa-check.sh" "$PRED_HOST"
          echo "✓ iah-E06 pre-flight PASSED for '$PRED_HOST' — production signing authorized"

      - name: Select transparency log (STAGING default; production via gated dispatch)
        id: trust
        env:
          USE_PROD: ${{ inputs.use-production-rekor }}
        run: |
          set -euo pipefail
          # use-production-rekor is only ever set via workflow_dispatch; on a
          # tag push the input is empty, so the default branch (staging) wins.
          # When it IS true, the iah-E06 pre-flight step above has already passed
          # (set -e would have failed the job otherwise), so reaching the
          # production branch here means DNSSEC + CAA are verified.
          if [ "${USE_PROD:-false}" = "true" ]; then
            # PRODUCTION sigstore public-good trust root. cosign's defaults are
            # already the production endpoints; we set them explicitly for an
            # auditable, pinned invocation. OIDC issuer is the GitHub Actions
            # ambient token issuer (id-token: write) — NOT a sigstage browser
            # issuer — which is also the issuer downstream
            # `cosign verify-blob --certificate-oidc-issuer` checks must expect.
            {
              echo "log=production"
              echo "rekor_url=https://rekor.sigstore.dev"
              echo "fulcio_url=https://fulcio.sigstore.dev"
              echo "oidc_issuer=https://token.actions.githubusercontent.com"
            } >> "$GITHUB_OUTPUT"
            echo "Signing target: PRODUCTION transparency log (rekor.sigstore.dev) — iah-E06 pre-flight passed"
          else
            {
              echo "log=staging"
              echo "rekor_url=https://rekor.sigstage.dev"
              echo "fulcio_url=https://fulcio.sigstage.dev"
              echo "oidc_issuer=https://oauth2.sigstage.dev/auth"
            } >> "$GITHUB_OUTPUT"
            echo "Signing target: STAGING transparency log (rekor.sigstage.dev)"
          fi

      - name: cosign sign-blob dist/index.js (keyless → selected log)
        env:
          LOG: ${{ steps.trust.outputs.log }}
          REKOR_URL: ${{ steps.trust.outputs.rekor_url }}
          FULCIO_URL: ${{ steps.trust.outputs.fulcio_url }}
          OIDC_ISSUER: ${{ steps.trust.outputs.oidc_issuer }}
        run: |
          set -euo pipefail
          # --new-bundle-format emits the sigstore protobuf Bundle (mediaType +
          # verificationMaterial + messageSignature) consumable by sigstore-js
          # verify(). The trust root (staging vs production) is selected by the
          # "Select transparency log" step via the explicit --rekor-url /
          # --fulcio-url / --oidc-issuer flags. cosign keyless uses the GH
          # Actions ambient OIDC token (id-token: write) automatically — no
          # --identity-token, no secret. Production is reached ONLY after the
          # iah-E06 DNSSEC/CAA pre-flight passed (fail-closed gate above).
          cosign sign-blob \
            --yes \
            --new-bundle-format \
            --rekor-url "$REKOR_URL" \
            --fulcio-url "$FULCIO_URL" \
            --oidc-issuer "$OIDC_ISSUER" \
            --bundle dist/index.js.sigstore.json \
            dist/index.js
          test -s dist/index.js.sigstore.json || { echo "::error::cosign produced no bundle"; exit 1; }
          echo "✓ signed dist/index.js → dist/index.js.sigstore.json (${LOG^^})"

      - name: Attach signature bundle to the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          # release job runs in parallel; create-or-upload is idempotent so the
          # ordering between the two jobs does not matter.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/index.js.sigstore.json --clobber
          else
            gh release create "$TAG" dist/index.js.sigstore.json \
              --title "$TAG" --generate-notes --verify-tag
          fi
          echo "✓ dist/index.js.sigstore.json attached to release $TAG"
