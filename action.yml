name: 'Intent Rollout Gate'
author: 'Jeremy Longshore (Intent Solutions)'
description: >-
  Consume an Evidence Bundle (in-toto Statement v1 rows under predicateType
  https://evals.intentsolutions.io/gate-result/v1) and a rollout policy, and
  decide allow / block (fail closed). All decision logic is delegated to the
  published @intentsolutions/rollout-gate package — this action is the thin
  GitHub Actions shell. Part of the Intent Eval Platform.

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  bundle-path:
    description: >-
      Filesystem path to the Evidence Bundle JSON file. Accepts both wire
      forms: the v2 plain array of in-toto Statements (kernel
      EvidenceBundlePayload) and the v1 legacy container
      {"bundle_format":"json-array","rows":[...]}. A missing, unreadable, or
      invalid-JSON file blocks (fail closed).
    required: true
  policy-path:
    description: >-
      Path to the rollout policy JSON document ({"required_gates":[...],
      "forbid_decisions":[...], "advisory_blocks":bool,
      "allow_unknown_gates":bool} — see @intentsolutions/rollout-gate
      parsePolicy). Exactly one of policy-path or policy-json is required;
      both or neither blocks (fail closed). Parsing tests/TESTING.md directly
      stays deferred per DR-002 § 5.
    required: false
    default: ''
  policy-json:
    description: >-
      Inline rollout policy as a JSON string. Exactly one of policy-path or
      policy-json is required; both or neither blocks (fail closed).
    required: false
    default: ''
  fail-on-block:
    description: >-
      If 'true' (default), a block decision fails the job. If 'false', the
      action succeeds and only reports outputs — observability rollouts ahead
      of enforcement. Any value other than an explicit 'false' fails on block
      (fail closed).
    required: false
    default: 'true'
  policy-file:
    description: >-
      DEPRECATED alias for policy-path (v0.0.x input name, kept additive per
      Evidence Bundle SPEC R18). Note the v0.0.x default of tests/TESTING.md
      is GONE — TESTING.md parsing is deferred per DR-002 § 5 and a markdown
      file would fail policy parsing anyway (fail closed).
    required: false
    default: ''
  predicate-uri:
    description: >-
      Reserved (v0.0.x input, kept additive). v0.2.0 evaluates only the
      stable v1 URI https://evals.intentsolutions.io/gate-result/v1; any
      other value blocks (fail closed).
    required: false
    default: 'https://evals.intentsolutions.io/gate-result/v1'
  rekor-url:
    description: >-
      Reserved (v0.0.x input, kept additive). Transparency-log anchoring of
      the rollout-decision row is NOT implemented at v0.2.0; no Rekor push
      ever happens (the DNSSEC + CAA pre-condition per DR-004 § 6.1 gates
      that milestone). Input is currently ignored.
    required: false
    default: 'https://rekor.sigstore.dev'
  cosign-key:
    description: >-
      Reserved (v0.0.x input, kept additive). Decision-row signing is NOT
      implemented at v0.2.0; setting this emits a warning and performs no
      signing.
    required: false
    default: ''
  dry-run:
    description: >-
      DEPRECATED alias for fail-on-block: 'false' (v0.0.x input, kept
      additive). If 'true', evaluate and report but never fail the job.
    required: false
    default: 'false'

outputs:
  decision:
    description: >-
      'allow' or 'block' — verbatim from @intentsolutions/rollout-gate
      decide() (allow corresponds to ship, block to no-ship in the
      pre-implementation v0.0.x vocabulary). The v0.0.x 'not-implemented'
      value is retired.
  reasons:
    description: >-
      JSON array string of every blocking reason (empty array exactly when
      decision is 'allow').
  summary:
    description: >-
      Markdown summary of the decision: required-gate table, blocking rows,
      and the flat reason list. Also written to the job step summary.
  signed-decision-row-path:
    description: >-
      Reserved — always empty at v0.2.0. Populated once decision-row signing
      (predicateType https://evals.intentsolutions.io/rollout-decision/v1)
      lands behind the DNSSEC + CAA pre-condition (DR-002 § 6.3).

runs:
  using: 'node24'
  main: 'dist/index.js'
